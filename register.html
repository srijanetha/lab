<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0;
    }
    .main {
      background: #fff; padding: 20px; width: 300px;
      border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    .main h2 { color: #4caf50; margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
    input, select {
      width: 100%; margin-bottom: 15px; padding: 10px;
      border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 15px; border: none;
      border-radius: 10px; background: #4caf50; color: white; font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="main">
    <h2>Registration Form</h2>
    <form onsubmit="return validateForm()">
      <label>First Name:</label>
      <input type="text" id="first" required>

      <label>Last Name:</label>
      <input type="text" id="last" required>

      <label>Email:</label>
      <input type="email" id="email" required>

      <label>Password:</label>
      <input type="password" id="password" required>

      <label>Re-type Password:</label>
      <input type="password" id="repassword" required>

      <label>Contact:</label>
      <input type="text" id="mobile" maxlength="10" required>

      <label>Gender:</label>
      <select id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    function validateForm() {
      let pass = document.getElementById("password").value;
      let repass = document.getElementById("repassword").value;
      let mobile = document.getElementById("mobile").value;

      if (pass !== repass) {
        alert("Passwords do not match!");
        return false;
      }
      if (!/^\d{10}$/.test(mobile)) {
        alert("Phone number must be 10 digits!");
        return false;
      }
      return true; // allow submit
    }
  </script>
</body>
</html>
